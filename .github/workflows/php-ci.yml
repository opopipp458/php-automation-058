name: PHP CI Example 2

on: [push] 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Setup PHP
      uses: shivammathur/setup-php@v2 
      with:
        php-version: '8.2'

    - name: Install dependencies
      run: composer install 

    - name: Run test
      run: ./vendor/bin/phpunit tests
